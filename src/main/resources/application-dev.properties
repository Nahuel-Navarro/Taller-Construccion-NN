# =============================================================================
# Perfil DEV: H2 en memoria
# Permite correr el proyecto sin instalar MySQL (útil para la corrección).
# =============================================================================

spring.datasource.url=jdbc:h2:mem:ecomarket;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Consola H2 disponible en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Carga data.sql después de crear el esquema con JPA
spring.sql.init.mode=always
