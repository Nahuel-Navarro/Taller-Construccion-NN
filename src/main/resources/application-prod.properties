# =============================================================================
# Perfil PROD: MySQL
# Requiere tener MySQL corriendo en localhost:3306 con la BD 'ecomarket' creada.
# Crear BD: CREATE DATABASE ecomarket CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
# =============================================================================

spring.datasource.url=jdbc:mysql://localhost:3306/ecomarket?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Cambiar a 'always' solo en la primera ejecución para cargar datos seed.
# Después dejar en 'never' para evitar duplicar filas en cada arranque
# (con ddl-auto=update el esquema no se recrea).
spring.sql.init.mode=never
