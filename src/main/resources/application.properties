# =============================================================================
# Configuración EcoMarket Backend
# =============================================================================
# Perfil activo por defecto: dev (H2 en memoria, sin instalar MySQL).
# Para usar MySQL: arrancar con --spring.profiles.active=prod
# =============================================================================

spring.profiles.active=dev
spring.application.name=ecomarket-backend
server.port=8080

# Prefijo común para toda la API
server.servlet.context-path=/

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.com.ecomarket=DEBUG

# Jackson: fechas como ISO-8601, no timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
